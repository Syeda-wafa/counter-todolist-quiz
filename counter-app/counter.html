<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Counter App</title>
    <link rel="icon" type="image/png" href="counter.jpg">
    <link rel="stylesheet" href="counter.css">
</head>
<body>

    <div class="container">
        <h1>Counter App</h1>

        <div class="box">
            <h2 id="count">0</h2>

            <div class="buttons">
                <button id="increase" class="btn green">+</button>
                <button id="decrease" class="btn red">−</button>
                <button id="reset" class="btn yellow">⟲</button>
            </div>
        </div>
    </div>

    <script src="counter.js"></script>
</body>
</html>
